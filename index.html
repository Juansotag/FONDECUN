<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FONDECUN | Dashboard Unificado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body x-data="dashboard">

    <header>
        <div class="logo-section">
            <h1>FONDECUN <span style="font-weight: 300; font-size: 0.8rem; vertical-align: middle; margin-left: 10px; color: #64748b;">DASHBOARD DE SEGUIMIENTO</span></h1>
        </div>
        <div class="header-actions">
            <span style="font-size: 0.8rem; color: #64748b;" x-text="allData.length + ' Instituciones'"></span>
        </div>
    </header>

    <main class="dashboard-container">
        <!-- TOP ROW: Map + Sankey -->
        <div class="top-row">
            <div class="map-card">
                <div class="card-header"><span>🗺️ Mapa de Instituciones</span></div>
                <div class="content-area">
                    <div id="map"></div>
                </div>
            </div>
            <div class="sankey-card">
                <div class="card-header"><span>📊 Flujo de Participación por Etapa</span></div>
                <div class="content-area">
                    <div id="sankey_basic" style="width:100%;height:100%;"></div>
                </div>
            </div>
        </div>

        <!-- BOTTOM ROW: Searchable Table -->
        <div class="bottom-row">
            <div class="table-controls">
                <input type="text" x-model="search" placeholder="Buscar por institución o municipio..." class="search-input">
                <span style="font-size:0.8rem;color:#64748b;align-self:center;" x-text="filteredIEDs.length + ' resultados'"></span>
            </div>
            <div style="overflow-x: auto; max-height: 380px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Institución Educativa</th>
                            <th>Municipio</th>
                            <th>Avance E1</th>
                            <th>Avance E2</th>
                            <th>Avance E3</th>
                            <th>Avance E4</th>
                            <th>Avance E5</th>
                            <th>Avance E6</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="ied in pagedIEDs" :key="ied.id">
                            <tr>
                                <td style="font-weight: 600;" x-text="ied.institucion"></td>
                                <td x-text="ied.municipio"></td>
                                <td x-text="fmtAvance(ied, 'e1')"></td>
                                <td x-text="fmtAvance(ied, 'e2')"></td>
                                <td x-text="fmtAvance(ied, 'e3')"></td>
                                <td x-text="fmtAvance(ied, 'e4')"></td>
                                <td x-text="fmtAvance(ied, 'e5')"></td>
                                <td x-text="fmtAvance(ied, 'e6')"></td>
                                <td><button class="btn-view" @click="selectIED(ied)">Ver Perfil</button></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:0.8rem;color:#64748b;">Página <span x-text="page+1"></span> de <span x-text="Math.ceil(filteredIEDs.length / pageSize) || 1"></span></span>
                <div style="display:flex;gap:8px;">
                    <button class="btn-view" style="background:#e2e8f0;color:#1e293b;" @click="page = Math.max(0, page-1)" :disabled="page === 0">‹ Anterior</button>
                    <button class="btn-view" style="background:#e2e8f0;color:#1e293b;" @click="page = Math.min(Math.ceil(filteredIEDs.length / pageSize) - 1, page+1)" :disabled="(page + 1) * pageSize >= filteredIEDs.length">Siguiente ›</button>
                </div>
            </div>
        </div>
    </main>

    <!-- DETAIL PANEL (Overlay Sidebar) -->
    <div class="overlay" x-show="selectedIED" x-transition @click.self="selectedIED = null">
        <div class="sidebar-detail">
            <button class="close-btn" @click="selectedIED = null">&times;</button>
            <template x-if="selectedIED">
                <div>
                    <!-- Header -->
                    <div style="margin-bottom: 28px;">
                        <span class="badge badge-primary">Ficha Institucional</span>
                        <h2 x-text="selectedIED.institucion" style="font-size: 1.5rem; margin: 12px 0 4px 0; line-height: 1.3;"></h2>
                        <div style="color: #64748b; font-size: 0.85rem;">
                            <span x-text="selectedIED.municipio"></span> | DANE: <span x-text="selectedIED.id"></span>
                        </div>
                    </div>

                    <!-- Institutional info grid -->
                    <div style="background: #f8fafc; border-radius: 10px; padding: 16px; margin-bottom: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.825rem;">
                        <template x-for="[label, key] in [['Estado','estado'],['Jornada','jornada'],['Carácter','caracter'],['Rector','rector'],['Especialidad','especialidad'],['Modelo Pedagógico','mp']]">
                            <div x-show="selectedIED[key]">
                                <span style="color:#94a3b8; font-weight:600;" x-text="label + ': '"></span>
                                <span x-text="selectedIED[key]"></span>
                            </div>
                        </template>
                    </div>

                    <!-- Timeline -->
                    <div class="timeline" style="margin-bottom: 28px;">
                        <template x-for="s in ['e1','e2','e3','e4','e5','e6']">
                            <div class="step" :class="selectedIED.etapas_cursadas[s] ? 'completed' : ''">
                                <div class="step-circle" x-text="s.toUpperCase()"></div>
                                <div style="font-size: 0.6rem; text-align: center; margin-top: 4px; color:#64748b;" x-text="getStageName(s)"></div>
                            </div>
                        </template>
                    </div>

                    <!-- Per-stage detail panels -->
                    <template x-for="s in ['e1','e2','e3','e4','e5','e6']">
                        <div x-show="selectedIED.etapas_cursadas[s]" style="margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden;">
                            <!-- Stage Header -->
                            <div style="background: var(--primary); color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: 700; font-size: 0.875rem;" x-text="s.toUpperCase() + ' — ' + getStageName(s)"></span>
                                <span class="badge" style="background: rgba(255,255,255,0.2); color: white;" x-text="selectedIED.avances[s] != null ? Math.round(selectedIED.avances[s]*100) + '% avance' : 'S/D'"></span>
                            </div>
                            <!-- Stage body: key metrics from detalles -->
                            <div style="padding: 14px 16px; font-size: 0.8rem;">

                                <!-- Participantes & formador -->
                                <div style="display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap;">
                                    <div x-show="selectedIED.participantes[s]">
                                        <span style="color:#94a3b8; font-weight:600;">Participantes: </span>
                                        <span x-text="selectedIED.participantes[s]"></span>
                                    </div>
                                    <div x-show="selectedIED.detalles[s]?.formador">
                                        <span style="color:#94a3b8; font-weight:600;">Formador: </span>
                                        <span x-text="selectedIED.detalles[s]?.formador"></span>
                                    </div>
                                    <div x-show="selectedIED.detalles[s]?.experto">
                                        <span style="color:#94a3b8; font-weight:600;">Experto: </span>
                                        <span x-text="selectedIED.detalles[s]?.experto"></span>
                                    </div>
                                    <div x-show="selectedIED.detalles[s]?.foco">
                                        <span style="color:#94a3b8; font-weight:600;">Foco: </span>
                                        <span x-text="selectedIED.detalles[s]?.foco"></span>
                                    </div>
                                    <div x-show="selectedIED.detalles[s]?.nivel">
                                        <span style="color:#94a3b8; font-weight:600;">Nivel: </span>
                                        <span x-text="selectedIED.detalles[s]?.nivel"></span>
                                    </div>
                                    <div x-show="selectedIED.detalles[s]?.eje">
                                        <span style="color:#94a3b8; font-weight:600;">Eje: </span>
                                        <span x-text="selectedIED.detalles[s]?.eje"></span>
                                    </div>
                                </div>

                                <!-- Quantitative indicators for E1 -->
                                <template x-if="s === 'e1' && selectedIED.detalles?.e1">
                                    <div style="margin-bottom: 10px;">
                                        <div style="font-weight: 600; margin-bottom: 6px; color:#475569;">Aportes a Gestión Académica (%)</div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                                            <template x-for="[lbl, key] in [['Prácticas Educativas','aporte_modificacion_practicas_educativas'],['Evaluación','aporte_procesos_evaluacion'],['Currículo','aporte_revisión_curricular'],['Docs PEI/PMI','aporte_fortalecimiento_documentos_pei_pmi'],['Planeación Aula','aporte_planeacion_aula'],['Prácticas Aula','aporte_practicas_aula'],['Fortalec. MP','aporte_fortalecimiento_mp']]">
                                                <div x-show="selectedIED.detalles.e1[key] != null">
                                                    <span style="color:#94a3b8;" x-text="lbl + ': '"></span>
                                                    <strong x-text="selectedIED.detalles.e1[key] != null ? Math.round(selectedIED.detalles.e1[key]*100) + '%' : 'S/D'"></strong>
                                                </div>
                                            </template>
                                        </div>
                                        <div x-show="selectedIED.detalles.e1?.avance_aportes_linea != null" style="margin-top:6px;">
                                            <span style="color:#94a3b8; font-weight:600;">Avance Aportes en Línea: </span>
                                            <strong x-text="selectedIED.detalles.e1.avance_aportes_linea != null ? Math.round(selectedIED.detalles.e1.avance_aportes_linea*100) + '%' : 'S/D'"></strong>
                                        </div>
                                    </div>
                                </template>

                                <!-- Quantitative indicators for E2 -->
                                <template x-if="s === 'e2' && selectedIED.detalles?.e2">
                                    <div style="margin-bottom: 10px;">
                                        <div style="font-weight: 600; margin-bottom: 6px; color:#475569;">Indicadores Etapa 2</div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                                            <template x-for="[lbl, key] in [['Avance Aporte','avance_aporte'],['1-1','1-1'],['1-2','1-2'],['1-3','1-3'],['2-1','2-1'],['2-2','2-2'],['2-3','2-3']]">
                                                <div x-show="selectedIED.detalles.e2[key] != null">
                                                    <span style="color:#94a3b8;" x-text="lbl + ': '"></span>
                                                    <strong x-text="selectedIED.detalles.e2[key]"></strong>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- Quantitative indicators for E3 -->
                                <template x-if="s === 'e3' && selectedIED.detalles?.e3">
                                    <div style="margin-bottom: 10px;">
                                        <div style="font-weight: 600; margin-bottom: 6px; color:#475569;">Indicadores Ciclos Reflexivos E3</div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                                            <template x-for="[lbl, key] in [['Ciclo 1','avance_ciclo_1'],['Ciclo 2','avance_ciclo_2'],['Niveles Reflexión','nivel_reflexion_docente'],['Aportes Línea','avance_aportes_linea'],['Aporte Planeación Aula','aporte_planeacion_aula_mp'],['Aporte Prácticas Aula','aporte_practicas_aula'],['Documentos','aporte_fortalecimiento_documentos']]">
                                                <div x-show="selectedIED.detalles.e3[key] != null">
                                                    <span style="color:#94a3b8;" x-text="lbl + ': '"></span>
                                                    <strong x-text="selectedIED.detalles.e3[key] != null && typeof selectedIED.detalles.e3[key] === 'number' ? Math.round(selectedIED.detalles.e3[key]*100) + '%' : selectedIED.detalles.e3[key]"></strong>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- Quantitative indicators for E4 -->
                                <template x-if="s === 'e4' && selectedIED.detalles?.e4">
                                    <div style="margin-bottom: 10px;">
                                        <div style="font-weight: 600; margin-bottom: 6px; color:#475569;">Indicadores Neurociencias E4</div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                                            <template x-for="[lbl, key] in [['1','1'],['2','2'],['3','3'],['Avance Foco','avance_foco']]">
                                                <div x-show="selectedIED.detalles.e4[key] != null">
                                                    <span style="color:#94a3b8;" x-text="lbl + ': '"></span>
                                                    <strong x-text="selectedIED.detalles.e4[key]"></strong>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- Quantitative indicators for E5 -->
                                <template x-if="s === 'e5' && selectedIED.detalles?.e5">
                                    <div style="margin-bottom: 10px;">
                                        <div style="font-weight: 600; margin-bottom: 6px; color:#475569;">Indicadores Modelo Pedagógico I (E5)</div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                                            <template x-for="[lbl, key] in [['Jornada Única Ind.1','jornada_unica_indicador_1'],['Jornada Única Ind.2','jornada_unica_indicador_2'],['Jornada Única Ind.3','jornada_unica_indicador_3'],['Avance Jornada Única','avance_jornada_única'],['Revisión Curricular','revision_curricular'],['Fortalecimiento Documental','fortalecimiento_documental'],['Planeación Aula','planeacion_aula'],['Prácticas Aula','practicas_aula']]">
                                                <div x-show="selectedIED.detalles.e5[key] != null">
                                                    <span style="color:#94a3b8;" x-text="lbl + ': '"></span>
                                                    <strong x-text="selectedIED.detalles.e5[key]"></strong>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- Qualitative: logros, retos, sugerencias -->
                                <div x-show="selectedIED.detalles[s]?.logros" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #f1f5f9;">
                                    <span style="color:#15803d; font-weight:600;">✓ Logros: </span>
                                    <span style="font-size:0.8rem;" x-text="selectedIED.detalles[s]?.logros"></span>
                                </div>
                                <div x-show="selectedIED.detalles[s]?.retos" style="margin-top: 6px;">
                                    <span style="color:#dc2626; font-weight:600;">⚠ Retos: </span>
                                    <span style="font-size:0.8rem;" x-text="selectedIED.detalles[s]?.retos"></span>
                                </div>
                                <div x-show="selectedIED.detalles[s]?.sugerencias" style="margin-top: 6px;">
                                    <span style="color:#d97706; font-weight:600;">💡 Sugerencias: </span>
                                    <span style="font-size:0.8rem;" x-text="selectedIED.detalles[s]?.sugerencias"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
        Alpine.data('dashboard', () => {
            return {
                Math: Math,
                search: '',
                allData: [],
                filteredIEDs: [],
                selectedIED: null,
                map: null,
                markers: [],
                page: 0,
                pageSize: 15,

                init() {
                    fetch('data_merged.json')
                        .then(res => res.json())
                        .then(data => {
                            this.allData = data.sort((a,b) => a.institucion.localeCompare(b.institucion));
                            this.filteredIEDs = this.allData;

                            this.$nextTick(() => {
                                this.initMap();
                                google.charts.load('current', {'packages': ['sankey']});
                                google.charts.setOnLoadCallback(() => this.drawSankey());
                            });
                        });

                    this.$watch('search', value => {
                        const s = value.toLowerCase().trim();
                        this.filteredIEDs = s
                            ? this.allData.filter(i => i.institucion.toLowerCase().includes(s) || i.municipio.toLowerCase().includes(s))
                            : this.allData;
                        this.page = 0;
                        this.updateMarkers();
                        if (this.map) this.drawSankey();
                    });
                },

                get pagedIEDs() {
                    return this.filteredIEDs.slice(this.page * this.pageSize, (this.page + 1) * this.pageSize);
                },

                fmtAvance(ied, stage) {
                    if (!ied.etapas_cursadas[stage]) return '—';
                    const v = ied.avances[stage];
                    return v != null ? Math.round(v * 100) + '%' : 'S/D';
                },

                getStageName(id) {
                    return { e1: 'Fundamentación', e2: 'Apropiación', e3: 'Reflexión', e4: 'Neurociencias', e5: 'Modelo I', e6: 'Modelo II' }[id];
                },

                selectIED(ied) { this.selectedIED = ied; },

                initMap() {
                    const mapEl = document.getElementById('map');
                    if (!mapEl || this.map) return;
                    this.map = L.map('map', { zoomControl: true }).setView([4.8, -74.1], 8);
                    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 18,
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(this.map);
                    this.updateMarkers();
                },

                updateMarkers() {
                    if (!this.map) return;
                    this.markers.forEach(m => this.map.removeLayer(m));
                    this.markers = [];

                    this.filteredIEDs.forEach(i => {
                        if (!i.lat || !i.lng) return;

                        // Color by max stage reached
                        const stages = ['e6','e5','e4','e3','e2','e1'];
                        const maxStage = stages.find(s => i.etapas_cursadas[s]);
                        const colors = { e6: '#00a884', e5: '#0ea5e9', e4: '#f59e0b', e3: '#8b5cf6', e2: '#f43f5e', e1: '#003366' };
                        const color = maxStage ? colors[maxStage] : '#94a3b8';

                        // Build tooltip HTML
                        const avStages = ['e1','e2','e3','e4','e5','e6'].filter(s => i.etapas_cursadas[s]);
                        const tipLines = [
                            `<b style="font-size:0.9rem">${i.institucion}</b>`,
                            `<span style="color:#64748b">${i.municipio}</span>`,
                            i.jornada ? `<span>Jornada: ${i.jornada}</span>` : '',
                            i.caracter ? `<span>Carácter: ${i.caracter}</span>` : '',
                            i.rector ? `<span>Rector(a): ${i.rector}</span>` : '',
                            i.especialidad ? `<span>Especialidad: ${i.especialidad}</span>` : '',
                            i.mp ? `<span>Modelo: ${i.mp}</span>` : '',
                            avStages.length ? `<hr style="margin:4px 0;border:none;border-top:1px solid #e2e8f0"><b>Etapas: ${avStages.join(', ').toUpperCase()}</b>` : ''
                        ].filter(Boolean).join('<br>');

                        const m = L.circleMarker([i.lat, i.lng], {
                            radius: 7, weight: 1.5, color: '#fff', fillColor: color, fillOpacity: 0.85
                        }).addTo(this.map);

                        m.bindTooltip(tipLines, { sticky: true, className: 'map-tooltip' });
                        m.on('click', () => this.selectIED(i));
                        this.markers.push(m);
                    });
                },

                drawSankey() {
                    const container = document.getElementById('sankey_basic');
                    if (!container || !this.filteredIEDs.length) return;

                    const dataTable = new google.visualization.DataTable();
                    dataTable.addColumn('string', 'De');
                    dataTable.addColumn('string', 'Para');
                    dataTable.addColumn('number', 'Escuelas');

                    const stages = ['e1','e2','e3','e4','e5','e6'];
                    const labelYes = { e1:'E1: Sí', e2:'E2: Sí', e3:'E3: Sí', e4:'E4: Sí', e5:'E5: Sí', e6:'E6: Sí' };
                    const labelNo  = { e1:'E1: No', e2:'E2: No', e3:'E3: No', e4:'E4: No', e5:'E5: No', e6:'E6: No' };

                    let flows = {};

                    this.filteredIEDs.forEach(school => {
                        for (let j = 0; j < stages.length - 1; j++) {
                            const cur  = stages[j];
                            const next = stages[j + 1];
                            const curNode  = school.etapas_cursadas[cur]  ? labelYes[cur]  : labelNo[cur];
                            const nextNode = school.etapas_cursadas[next] ? labelYes[next] : labelNo[next];
                            const key = `${curNode}|${nextNode}`;
                            flows[key] = (flows[key] || 0) + 1;
                        }
                    });

                    const rows = Object.entries(flows).map(([k,v]) => { const [a,b]=k.split('|'); return [a,b,v]; });
                    if (!rows.length) return;
                    dataTable.addRows(rows);

                    // Build ordered node array so colors can be set by position
                    // Assign green to Sí nodes, red/gray to No nodes
                    // Google Charts assigns colors in order nodes first appear in data
                    // Strategy: sort rows so Yes nodes come first => they get green
                    // We can't guarantee order, so we use a workaround via 'colors' array
                    // Nodes in order they appear in dataTable: iterate rows
                    const seen = [];
                    rows.forEach(([a, b]) => {
                        if (!seen.includes(a)) seen.push(a);
                        if (!seen.includes(b)) seen.push(b);
                    });

                    const nodeColors = seen.map(n => n.includes(': Sí') ? '#00a884' : '#f43f5e');
                    const linkColors = seen.map(n => n.includes(': Sí') ? 'rgba(0,168,132,0.3)' : 'rgba(244,63,94,0.2)');

                    const options = {
                        sankey: {
                            node: {
                                colors: nodeColors,
                                label: { fontName: 'Inter', fontSize: 11, color: '#1e293b', bold: true },
                                nodePadding: 15,
                                width: 12
                            },
                            link: {
                                colorMode: 'source',
                                colors: seen.map(n => n.includes(': Sí') ? '#00a884' : '#f43f5e')
                            }
                        }
                    };

                    const chart = new google.visualization.Sankey(container);
                    chart.draw(dataTable, options);
                }
            };
        });
        });
    </script>
</body>
</html>
